<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学生制霸生成器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <header class="hero">
      <div class="hero-copy">
        <p class="eyebrow">Campus Conquest</p>
        <h1>大学生制霸生成器</h1>
        <p class="subtitle">看看你的大学生活副本完成度。</p>
      </div>

      <section class="result-card" aria-label="制霸结果卡片">
        <div class="result-main">
          <span class="result-label">当前制霸率</span>
          <strong class="rate-value" id="rateValue">0%</strong>
          <p class="title-line">称号：<span id="titleValue">大学新手村</span></p>
        </div>

        <div class="progress-track" aria-hidden="true">
          <div class="progress-fill" id="progressFill"></div>
        </div>

        <dl class="score-row">
          <div>
            <dt>当前总分</dt>
            <dd id="scoreValue">0</dd>
          </div>
          <div>
            <dt>最大总分</dt>
            <dd id="maxScoreValue">120</dd>
          </div>
          <div>
            <dt>已选项目</dt>
            <dd id="checkedValue">0/30</dd>
          </div>
        </dl>

        <div class="action-row">
          <button class="button button-primary" type="button" id="copyButton">复制分享文案</button>
          <button class="button button-secondary" type="button" id="downloadButton">下载分享图</button>
          <button class="button button-secondary" type="button" id="resetButton">重置</button>
        </div>
        <p class="copy-status" id="copyStatus" role="status" aria-live="polite"></p>
      </section>
    </header>

    <section class="share-section" aria-labelledby="shareTitle">
      <article class="share-poster" aria-label="分享结果卡片">
        <div class="share-poster__top">
          <p class="share-poster__kicker">Campus Conquest Report</p>
          <h2 id="shareTitle">我的大学校园制霸报告</h2>
          <p class="share-poster__subtitle">看看我点亮了多少大学生活地图</p>
        </div>

        <div class="share-poster__hero">
          <div>
            <span class="share-poster__label">制霸率</span>
            <strong class="share-poster__rate" id="shareCardRate">0%</strong>
          </div>
          <div class="share-poster__title-box">
            <span class="share-poster__label">称号</span>
            <strong id="shareCardTitle">大学新手村</strong>
          </div>
        </div>

        <div class="share-poster__block">
          <h3>我的大学人格标签</h3>
          <div class="share-tags" id="shareCardTags">
            <span class="share-tag">普通大学生</span>
          </div>
        </div>

        <div class="share-poster__block">
          <h3>最强校园区域</h3>
          <p class="share-strongest-area" id="shareCardStrongestArea">还在新手村入口</p>
        </div>

        <div class="share-poster__block">
          <h3>迷你校园地图</h3>
          <div class="share-mini-map" id="shareMiniMap" aria-label="分享卡片迷你地图"></div>
        </div>

        <div class="share-poster__block">
          <h3>已制霸项目摘要</h3>
          <ul class="share-items-list" id="shareCardItems">
            <li class="share-items-list__empty">还在新手村探索中</li>
          </ul>
          <p class="share-items-more" id="shareCardItemsMore"></p>
        </div>

        <p class="share-poster__footer">
          不是所有人都能绩点制霸，但每个人都可以期末周幸存。
        </p>
      </article>
    </section>

    <section class="map-section" aria-labelledby="mapTitle">
      <div class="section-head">
        <h2 id="mapTitle">我的大学校园地图</h2>
      </div>
      <div class="campus-map" id="mapAreas"></div>
    </section>

    <section class="items-section" aria-labelledby="itemsTitle">
      <div class="section-head">
        <h2 id="itemsTitle">大学生活项目</h2>
      </div>
      <div class="items-grid" id="itemsGrid"></div>
    </section>

    <footer class="page-footer">
      不是所有人都能绩点制霸，但每个人都可以期末周幸存。
    </footer>
  </main>

  <script src="vendor/html2canvas.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
